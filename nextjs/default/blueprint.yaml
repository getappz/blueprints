version: 1

meta:
  name: "Next.js"
  description: "Base Next.js project"
  framework: "nextjs"
  create_command: "npx create-next-app@latest"

tasks:
  dev:
    - desc: "Start development server"
      run: "npm run dev"
  build:
    - desc: "Build for production"
      run: "npm run build"
  start:
    - desc: "Start production server"
      run: "npm run start"
  lint:
    - desc: "Run linter"
      run: "npm run lint"
