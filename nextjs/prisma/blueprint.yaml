version: 1

meta:
  name: "Next.js + Prisma"
  description: "Next.js with Prisma ORM and PostgreSQL"
  framework: "nextjs"
  create_command: "npx create-next-app@latest"

config:
  database_url: "postgresql://localhost:5432/myapp"

setup:
  - desc: "Install Prisma CLI"
    add_dependency: ["prisma"]
    dev: true

  - desc: "Install Prisma Client"
    add_dependency: ["@prisma/client"]

  - desc: "Initialize Prisma"
    run: "npx prisma init"

  - desc: "Set database URL"
    set_env:
      DATABASE_URL: "{{database_url}}"

  - desc: "Create Prisma client singleton"
    mkdir: "src/lib"

  - desc: "Create db helper"
    write_file:
      path: "src/lib/db.ts"
      content: |
        import { PrismaClient } from "@prisma/client";

        const globalForPrisma = globalThis as unknown as {
          prisma: PrismaClient | undefined;
        };

        export const prisma = globalForPrisma.prisma ?? new PrismaClient();

        if (process.env.NODE_ENV !== "production") {
          globalForPrisma.prisma = prisma;
        }

tasks:
  dev:
    - run: "npm run dev"
  build:
    - run: "npm run build"
  db:push:
    - desc: "Push schema to database"
      run: "npx prisma db push"
  db:migrate:
    - desc: "Run migrations"
      run: "npx prisma migrate dev"
  db:studio:
    - desc: "Open Prisma Studio"
      run: "npx prisma studio"
  db:seed:
    - desc: "Run seed script"
      run: "npx prisma db seed"
