version: 1

meta:
  name: "Astro"
  description: "Base Astro project"
  framework: "astro"
  create_command: "npm create astro@latest"

tasks:
  dev:
    - desc: "Start development server"
      run: "npm run dev"
  build:
    - desc: "Build for production"
      run: "npm run build"
  preview:
    - desc: "Preview production build"
      run: "npm run preview"
