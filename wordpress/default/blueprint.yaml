version: 1

meta:
  name: "WordPress"
  description: "Base WordPress project"
  framework: "wordpress"

tasks:
  dev:
    - desc: "Start development server"
      run: "ddev start && ddev launch"
  stop:
    - desc: "Stop development server"
      run: "ddev stop"
  logs:
    - desc: "View server logs"
      run: "ddev logs -f"
  wp:
    - desc: "Run WP-CLI command"
      run: "ddev wp"
