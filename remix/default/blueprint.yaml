version: 1

meta:
  name: "Remix"
  description: "Base Remix project"
  framework: "remix"
  create_command: "npx create-remix@latest"

tasks:
  dev:
    - desc: "Start development server"
      run: "npm run dev"
  build:
    - desc: "Build for production"
      run: "npm run build"
  start:
    - desc: "Start production server"
      run: "npm run start"
