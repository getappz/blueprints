version: 1

meta:
  name: "Docusaurus"
  description: "Base Docusaurus project"
  framework: "docusaurus"
  create_command: "npx create-docusaurus@latest"

tasks:
  dev:
    - desc: "Start development server"
      run: "npm run start"
  build:
    - desc: "Build for production"
      run: "npm run build"
  serve:
    - desc: "Serve production build"
      run: "npm run serve"
