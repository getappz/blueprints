version: 1

meta:
  name: "Vite"
  description: "Base Vite project"
  framework: "vite"
  create_command: "npm create vite@latest"

tasks:
  dev:
    - desc: "Start development server"
      run: "npm run dev"
  build:
    - desc: "Build for production"
      run: "npm run build"
  preview:
    - desc: "Preview production build"
      run: "npm run preview"
