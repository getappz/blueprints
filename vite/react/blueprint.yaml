version: 1

meta:
  name: "Vite + React + Tailwind"
  description: "Vite with React and Tailwind CSS"
  framework: "vite"
  create_command: "npm create vite@latest -- --template react-ts"

setup:
  - desc: "Install Tailwind CSS"
    add_dependency: ["tailwindcss", "@tailwindcss/vite"]
    dev: true

  - desc: "Add Tailwind Vite plugin"
    write_file:
      path: "vite.config.ts"
      content: |
        import { defineConfig } from "vite";
        import react from "@vitejs/plugin-react";
        import tailwindcss from "@tailwindcss/vite";

        export default defineConfig({
          plugins: [react(), tailwindcss()],
        });

  - desc: "Add Tailwind import"
    write_file:
      path: "src/index.css"
      content: |
        @import "tailwindcss";

tasks:
  dev:
    - run_locally: "npm run dev"
  build:
    - run_locally: "npm run build"
  preview:
    - run_locally: "npm run preview"
