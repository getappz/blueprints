version: 1

meta:
  name: "Cloudflare"
  description: "Deploy to Cloudflare (Workers + Static Assets)"

platform:
  slug: "cloudflare"
  cli_tool: "wrangler"
  install_hint: "npm install -g wrangler"
  auth_env_var: "CLOUDFLARE_API_TOKEN"
  login_hint: "wrangler login"
  detect_config:
    - "wrangler.toml"
    - "wrangler.json"
    - "wrangler.jsonc"
  detect_state: []
  capabilities:
    env_vars: true
    custom_domains: true
    preview: true
  ci:
    trigger_branches: ["main"]
    secrets:
      - name: CLOUDFLARE_API_TOKEN
        from_env: CLOUDFLARE_API_TOKEN
        prompt: "Cloudflare API token"
      - name: CLOUDFLARE_ACCOUNT_ID
        from_env: CLOUDFLARE_ACCOUNT_ID
        from_config_file: wrangler.toml
        config_toml_key: account_id
        prompt: "Cloudflare Account ID"

config:
  project_name: ""
  build_output_dir: "dist"

setup:
  - desc: "Install Wrangler CLI"
    add_dependency: ["wrangler"]
    dev: true
  - desc: "Generate wrangler.jsonc if missing"
    generate_config:
      filename: "wrangler.jsonc"
      skip_if_exists:
        - "wrangler.toml"
        - "wrangler.json"
        - "wrangler.jsonc"
      template: |
        {
          // Cloudflare Worker — generated by appz
          "name": "{{project_name}}",
          "compatibility_date": "{{today}}",
          "assets": {
            "directory": "./{{build_output_dir}}"
          }
        }

tasks:
  deploy:
    - desc: "Deploy to Cloudflare"
      run: "wrangler deploy"

  deploy:preview:
    - desc: "Deploy preview to Cloudflare"
      run: "wrangler versions upload"

  preview:
    - desc: "Start local development server"
      run: "wrangler dev"

  cloudflare:login:
    - desc: "Login to Cloudflare"
      run: "wrangler login"

  cloudflare:whoami:
    - desc: "Check authenticated Cloudflare account"
      run: "wrangler whoami"

  cloudflare:secret:list:
    - desc: "List secrets"
      run: "wrangler secret list"

  cloudflare:secret:set:
    - desc: "Set secret (set CF_SECRET_KEY)"
      run: "wrangler secret put {{CF_SECRET_KEY}}"

  cloudflare:secret:delete:
    - desc: "Delete secret (set CF_SECRET_KEY)"
      run: "wrangler secret delete {{CF_SECRET_KEY}}"

  cloudflare:tail:
    - desc: "Tail live logs"
      run: "wrangler tail"

  cloudflare:deployments:list:
    - desc: "List recent deployments"
      run: "wrangler deployments list"

  cloudflare:rollback:
    - desc: "Rollback to previous deployment"
      run: "wrangler rollback"
