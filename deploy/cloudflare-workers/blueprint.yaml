version: 1

meta:
  name: "Cloudflare Workers"
  description: "Deploy to Cloudflare Workers"

platform:
  slug: "cloudflare-workers"
  cli_tool: "wrangler"
  install_hint: "npm install -g wrangler"
  auth_env_var: "CLOUDFLARE_API_TOKEN"
  login_hint: "Run 'wrangler login' or set CLOUDFLARE_API_TOKEN"
  detect_config:
    - "wrangler.toml"
  detect_state: []
  detect_content:
    - path: "wrangler.toml"
      contains: "main ="
  capabilities:
    env_vars: true
    custom_domains: true

config:
  # Cloudflare Worker name (required)
  worker_name: ""
  # Cloudflare account ID (set via CLOUDFLARE_ACCOUNT_ID env var or wrangler.toml)
  account_id: ""
  # Entry point for the Worker (e.g., src/index.ts)
  main: "src/index.ts"
  # Compatibility date (required by Cloudflare, e.g., 2024-01-01)
  compatibility_date: ""
  # Environment/namespace (optional, e.g., production, staging)
  environment: ""
  # Cloudflare API token (set via CLOUDFLARE_API_TOKEN env var)
  cloudflare_api_token: ""


setup:
  - desc: "Install Wrangler CLI"
    add_dependency: ["wrangler"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Cloudflare Workers"
      run: "wrangler deploy"

  deploy:production:
    - desc: "Deploy to production environment on Cloudflare Workers"
      run: "wrangler deploy --env production"

  wrangler:dev:
    - desc: "Start local development server"
      run: "wrangler dev"

  wrangler:login:
    - desc: "Login to Cloudflare"
      run: "wrangler login"

  wrangler:whoami:
    - desc: "Check authenticated Cloudflare account"
      run: "wrangler whoami"

  wrangler:env:list:
    - desc: "List environment variables/secrets"
      run: "wrangler secret list"

  wrangler:env:set:
    - desc: "Set secret/environment variable (set CF_SECRET_KEY)"
      run: "wrangler secret put {{CF_SECRET_KEY}}"

  wrangler:env:delete:
    - desc: "Delete secret (set CF_SECRET_KEY)"
      run: "wrangler secret delete {{CF_SECRET_KEY}}"

  wrangler:tail:
    - desc: "Tail live logs from deployed Worker"
      run: "wrangler tail"

  wrangler:deployments:list:
    - desc: "List recent deployments"
      run: "wrangler deployments list"

  wrangler:rollback:
    - desc: "Rollback to previous deployment"
      run: "wrangler rollback"
