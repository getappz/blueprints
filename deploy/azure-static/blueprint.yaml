version: 1

meta:
  name: "Azure Static Web Apps"
  description: "Deploy to Azure Static Web Apps"

platform:
  slug: "azure-static"
  cli_tool: "swa"
  install_hint: "npm install -g @azure/static-web-apps-cli"
  auth_env_var: "AZURE_STATIC_WEB_APPS_API_TOKEN"
  login_hint: "Run 'az login' or set AZURE_STATIC_WEB_APPS_API_TOKEN"
  detect_config:
    - "staticwebapp.config.json"
    - "swa-cli.config.json"
  detect_state: []
  capabilities:
    env_vars: true
    custom_domains: true
    preview: true

config:
  # Azure Static Web App name (required)
  app_name: ""
  # Azure resource group (required)
  resource_group: ""
  # Azure subscription ID (optional, uses default if not set)
  subscription_id: ""
  # Build command
  build_command: "npm run build"
  # Build output directory
  build_output_dir: "dist"
  # Location/region (default: eastus2)
  location: "eastus2"


setup:
  - desc: "Install Azure CLI and Static Web Apps CLI"
    add_dependency: ["@azure/static-web-apps-cli"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Azure Static Web Apps"
      run: "swa deploy {{build_output_dir}} --app-name {{app_name}} --resource-group {{resource_group}}"

  deploy:production:
    - desc: "Deploy to production on Azure Static Web Apps"
      run: "swa deploy {{build_output_dir}} --app-name {{app_name}} --resource-group {{resource_group}} --env production"

  azure:login:
    - desc: "Login to Azure"
      run: "az login"

  azure:create:
    - desc: "Create Azure Static Web App"
      run: "az staticwebapp create --name {{app_name}} --resource-group {{resource_group}} --location {{location}}"

  azure:env:set:
    - desc: "Set environment variable (set AZURE_ENV_KEY and AZURE_ENV_VALUE)"
      run: "az staticwebapp appsettings set --name {{app_name}} --resource-group {{resource_group}} --setting-names {{AZURE_ENV_KEY}}={{AZURE_ENV_VALUE}}"

  azure:env:list:
    - desc: "List environment variables"
      run: "az staticwebapp appsettings list --name {{app_name}} --resource-group {{resource_group}}"

  azure:domains:list:
    - desc: "List custom domains"
      run: "az staticwebapp hostname list --name {{app_name}} --resource-group {{resource_group}}"

  azure:domains:add:
    - desc: "Add custom domain (set AZURE_DOMAIN)"
      run: "az staticwebapp hostname set --name {{app_name}} --resource-group {{resource_group}} --hostname {{AZURE_DOMAIN}}"
