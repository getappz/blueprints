version: 1

meta:
  name: "Render"
  description: "Deploy to Render"

config:
  # Render service ID (required)
  service_id: ""
  # Render API key (set via RENDER_API_KEY env var or config)
  render_api_key: ""
  # Build command
  build_command: "npm run build"
  # Start command (for production)
  start_command: "npm start"
  # Environment (production, staging)
  environment: "production"


setup:
  - desc: "Install Render CLI"
    add_dependency: ["render-cli"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Render"
      run: "render deploy"

  deploy:production:
    - desc: "Deploy to production on Render"
      run: "render deploy --service {{service_id}}"

  render:init:
    - desc: "Initialize Render service"
      run: "render init"

  render:login:
    - desc: "Login to Render"
      run: "render login"

  render:env:list:
    - desc: "List environment variables"
      run: "render env list --service {{service_id}}"

  render:env:set:
    - desc: "Set environment variable (set RENDER_ENV_KEY and RENDER_ENV_VALUE)"
      run: "render env set {{RENDER_ENV_KEY}}={{RENDER_ENV_VALUE}} --service {{service_id}}"

  render:logs:
    - desc: "View deployment logs"
      run: "render logs --service {{service_id}}"

  render:status:
    - desc: "Check service status"
      run: "render status --service {{service_id}}"
