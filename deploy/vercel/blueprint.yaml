version: 1

meta:
  name: "Vercel"
  description: "Deploy to Vercel"

platform:
  slug: "vercel"
  cli_tool: "vercel"
  install_hint: "npm install -g vercel"
  auth_env_var: "VERCEL_TOKEN"
  login_hint: "vercel login"
  detect_config:
    - "vercel.json"
  detect_state:
    - ".vercel/project.json"
  capabilities:
    env_vars: true
    custom_domains: true
    rollback: true
    preview: true
  ci:
    trigger_branches: ["main"]
    secrets:
      - name: VERCEL_TOKEN
        from_env: VERCEL_TOKEN
        prompt: "Vercel API token (https://vercel.com/account/tokens)"
      - name: VERCEL_ORG_ID
        from_state_file: .vercel/project.json
        state_json_key: orgId
        prompt: "Vercel Org ID"
      - name: VERCEL_PROJECT_ID
        from_state_file: .vercel/project.json
        state_json_key: projectId
        prompt: "Vercel Project ID"

config:
  # Vercel project name (optional, will use directory name if not set)
  project_name: ""
  # Vercel team/organization (optional)
  team: ""
  # Build output directory (framework-specific, e.g., "dist", "build", ".next")
  build_output: "dist"
  # Build command (framework-specific, e.g., "npm run build", "next build")
  build_command: "npm run build"
  # Environment (production, preview, development)
  environment: "production"
  # Vercel token (set via VERCEL_TOKEN env var or config)
  vercel_token: ""


setup:
  - desc: "Install Vercel CLI"
    add_dependency: ["vercel"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Vercel"
      run: "vercel deploy --prod"

  deploy:preview:
    - desc: "Deploy preview to Vercel"
      run: "vercel deploy"

  deploy:production:
    - desc: "Deploy to production on Vercel"
      run: "vercel deploy --prod"

  preview:
    - desc: "Preview deployment locally"
      run: "vercel dev"

  vercel:env:list:
    - desc: "List environment variables"
      run: "vercel env ls"

  vercel:env:add:
    - desc: "Add environment variable (set VERCEL_ENV_KEY and VERCEL_ENV_VALUE)"
      run: "vercel env add {{VERCEL_ENV_KEY}}"

  vercel:domains:list:
    - desc: "List domains"
      run: "vercel domains ls"

  vercel:domains:add:
    - desc: "Add domain (set VERCEL_DOMAIN)"
      run: "vercel domains add {{VERCEL_DOMAIN}}"

  vercel:logs:
    - desc: "View deployment logs"
      run: "vercel logs"
