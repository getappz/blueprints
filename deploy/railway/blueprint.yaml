version: 1

meta:
  name: "Railway"
  description: "Deploy to Railway"

config:
  # Railway project name (optional, will use directory name if not set)
  project_name: ""
  # Railway service name (optional)
  service_name: ""
  # Build command
  build_command: "npm run build"
  # Start command (for production)
  start_command: "npm start"
  # Railway token (set via RAILWAY_TOKEN env var or config)
  railway_token: ""


setup:
  - desc: "Install Railway CLI"
    add_dependency: ["@railway/cli"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Railway"
      run: "railway up"

  deploy:production:
    - desc: "Deploy to production on Railway"
      run: "railway up --service {{service_name}}"

  railway:init:
    - desc: "Initialize Railway project"
      run: "railway init"

  railway:login:
    - desc: "Login to Railway"
      run: "railway login"

  railway:link:
    - desc: "Link to existing Railway project"
      run: "railway link"

  railway:env:list:
    - desc: "List environment variables"
      run: "railway variables"

  railway:env:set:
    - desc: "Set environment variable (set RAILWAY_ENV_KEY and RAILWAY_ENV_VALUE)"
      run: "railway variables set {{RAILWAY_ENV_KEY}}={{RAILWAY_ENV_VALUE}}"

  railway:logs:
    - desc: "View deployment logs"
      run: "railway logs"

  railway:open:
    - desc: "Open Railway dashboard in browser"
      run: "railway open"
