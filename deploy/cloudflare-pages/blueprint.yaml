version: 1

meta:
  name: "Cloudflare Pages"
  description: "Deploy to Cloudflare Pages"

platform:
  slug: "cloudflare-pages"
  cli_tool: "wrangler"
  install_hint: "npm install -g wrangler"
  auth_env_var: "CLOUDFLARE_API_TOKEN"
  login_hint: "Run 'wrangler login' or set CLOUDFLARE_API_TOKEN"
  detect_config:
    - "wrangler.toml"
    - "wrangler.json"
    - "wrangler.jsonc"
  detect_state: []
  capabilities:
    env_vars: true
    custom_domains: true
    preview: true

config:
  # Cloudflare account ID (required)
  account_id: ""
  # Project name (required)
  project_name: ""
  # Build command (defaults to framework detection)
  build_command: "npm run build"
  # Build output directory (defaults to framework detection)
  build_output_dir: "dist"
  # Production branch (default: main)
  production_branch: "main"


setup:
  - desc: "Install Wrangler CLI"
    add_dependency: ["wrangler"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Cloudflare Pages"
      run: "wrangler pages deploy {{build_output_dir}} --project-name={{project_name}}"

  deploy:preview:
    - desc: "Deploy preview to Cloudflare Pages"
      run: "wrangler pages deploy {{build_output_dir}} --project-name={{project_name}} --branch=preview"

  deploy:production:
    - desc: "Deploy to production on Cloudflare Pages"
      run: "wrangler pages deploy {{build_output_dir}} --project-name={{project_name}} --branch={{production_branch}}"

  preview:
    - desc: "Preview deployment locally"
      run: "wrangler pages dev {{build_output_dir}}"

  cloudflare:env:list:
    - desc: "List environment variables"
      run: "wrangler pages project list"

  cloudflare:env:set:
    - desc: "Set environment variable (set CLOUDFLARE_ENV_KEY and CLOUDFLARE_ENV_VALUE)"
      run: "wrangler pages secret put {{CLOUDFLARE_ENV_KEY}} --project-name={{project_name}}"

  cloudflare:domains:list:
    - desc: "List custom domains"
      run: "wrangler pages domain list --project-name={{project_name}}"

  cloudflare:domains:add:
    - desc: "Add custom domain (set CLOUDFLARE_DOMAIN)"
      run: "wrangler pages domain add {{CLOUDFLARE_DOMAIN}} --project-name={{project_name}}"

  cloudflare:worker:deploy:
    - desc: "Deploy Cloudflare Worker (if using Workers)"
      run: "wrangler deploy"
