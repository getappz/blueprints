version: 1

meta:
  name: "Fly.io"
  description: "Deploy to Fly.io"

platform:
  slug: "fly"
  cli_tool: "flyctl"
  install_hint: "curl -L https://fly.io/install.sh | sh"
  auth_env_var: "FLY_API_TOKEN"
  login_hint: "Run 'flyctl auth login' or set FLY_API_TOKEN"
  detect_config:
    - "fly.toml"
  detect_state: []
  capabilities:
    env_vars: true
    custom_domains: true
    rollback: true

config:
  # Fly.io app name (required)
  app_name: ""
  # Fly.io organization (optional)
  org: ""
  # Build command
  build_command: "npm run build"
  # Start command (for production)
  start_command: "npm start"
  # Region (default: ord)
  region: "ord"


setup:
  - desc: "Install Fly CLI"
    add_dependency: ["flyctl"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Fly.io"
      run: "flyctl deploy"

  deploy:production:
    - desc: "Deploy to production on Fly.io"
      run: "flyctl deploy --app {{app_name}}"

  fly:init:
    - desc: "Initialize Fly.io app"
      run: "flyctl launch --name {{app_name}}"

  fly:login:
    - desc: "Login to Fly.io"
      run: "flyctl auth login"

  fly:secrets:list:
    - desc: "List secrets/environment variables"
      run: "flyctl secrets list --app {{app_name}}"

  fly:secrets:set:
    - desc: "Set secret/environment variable (set FLY_SECRET_KEY and FLY_SECRET_VALUE)"
      run: "flyctl secrets set {{FLY_SECRET_KEY}}={{FLY_SECRET_VALUE}} --app {{app_name}}"

  fly:logs:
    - desc: "View deployment logs"
      run: "flyctl logs --app {{app_name}}"

  fly:status:
    - desc: "Check app status"
      run: "flyctl status --app {{app_name}}"

  fly:open:
    - desc: "Open app in browser"
      run: "flyctl open --app {{app_name}}"

  fly:scale:
    - desc: "Scale app (set FLY_SCALE_COUNT)"
      run: "flyctl scale count {{FLY_SCALE_COUNT}} --app {{app_name}}"
