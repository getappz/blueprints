version: 1

meta:
  name: "Surge"
  description: "Deploy to Surge.sh"

platform:
  slug: "surge"
  cli_tool: "surge"
  install_hint: "npm install -g surge"
  auth_env_var: "SURGE_TOKEN"
  login_hint: "surge login"
  detect_config: []
  detect_state: []
  detect_content:
    - path: "CNAME"
      contains: ".surge.sh"
  capabilities: {}

config:
  # Surge domain (e.g., myapp.surge.sh)
  domain: ""
  # Build command
  build_command: "npm run build"
  # Build output directory
  build_output_dir: "dist"
  # Surge token (set via SURGE_TOKEN env var or config)
  surge_token: ""


setup:
  - desc: "Install Surge CLI"
    add_dependency: ["surge"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Surge.sh"
      run: "surge {{build_output_dir}} {{domain}}"

  deploy:production:
    - desc: "Deploy to production on Surge.sh"
      run: "surge {{build_output_dir}} {{domain}}"

  surge:domain:set:
    - desc: "Set custom domain (set SURGE_CUSTOM_DOMAIN)"
      run: "surge {{build_output_dir}} {{SURGE_CUSTOM_DOMAIN}}"

  surge:list:
    - desc: "List all deployments"
      run: "surge list"

  surge:teardown:
    - desc: "Remove domain from Surge (set SURGE_DOMAIN_TO_REMOVE)"
      run: "surge teardown {{SURGE_DOMAIN_TO_REMOVE}}"
