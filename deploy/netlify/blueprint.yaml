version: 1

meta:
  name: "Netlify"
  description: "Deploy to Netlify"

platform:
  slug: "netlify"
  cli_tool: "netlify"
  install_hint: "npm install -g netlify-cli"
  auth_env_var: "NETLIFY_AUTH_TOKEN"
  login_hint: "netlify login"
  detect_config:
    - "netlify.toml"
  detect_state:
    - ".netlify/state.json"
  capabilities:
    env_vars: true
    custom_domains: true
    rollback: true
    preview: true
  ci:
    trigger_branches: ["main"]
    secrets:
      - name: NETLIFY_AUTH_TOKEN
        from_env: NETLIFY_AUTH_TOKEN
        prompt: "Netlify auth token"
      - name: NETLIFY_SITE_ID
        from_state_file: .netlify/state.json
        state_json_key: siteId
        prompt: "Netlify site ID"

config:
  # Netlify site ID (optional, can be auto-detected from netlify.toml)
  site_id: ""
  # Build command (defaults to framework detection)
  build_command: "npm run build"
  # Publish directory (defaults to framework detection)
  publish_dir: "dist"
  # Netlify access token (set via NETLIFY_AUTH_TOKEN env var or config)
  netlify_token: ""


setup:
  - desc: "Install Netlify CLI"
    add_dependency: ["netlify-cli"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Netlify"
      run: "netlify deploy --prod --dir={{publish_dir}}"

  deploy:preview:
    - desc: "Deploy preview to Netlify"
      run: "netlify deploy --dir={{publish_dir}}"

  deploy:production:
    - desc: "Deploy to production on Netlify"
      run: "netlify deploy --prod --dir={{publish_dir}}"

  preview:
    - desc: "Preview deployment locally"
      run: "netlify dev"

  netlify:env:list:
    - desc: "List environment variables"
      run: "netlify env:list"

  netlify:env:set:
    - desc: "Set environment variable (set NETLIFY_ENV_KEY and NETLIFY_ENV_VALUE)"
      run: "netlify env:set {{NETLIFY_ENV_KEY}} {{NETLIFY_ENV_VALUE}}"

  netlify:functions:deploy:
    - desc: "Deploy Netlify Functions"
      run: "netlify functions:deploy"

  netlify:status:
    - desc: "Check deployment status"
      run: "netlify status"

  netlify:open:
    - desc: "Open site in browser"
      run: "netlify open"
