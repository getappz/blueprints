version: 1

meta:
  name: "Firebase Hosting"
  description: "Deploy to Firebase Hosting"

config:
  # Firebase project ID (required)
  project_id: ""
  # Firebase site ID (for hosting, optional)
  site_id: ""
  # Build command
  build_command: "npm run build"
  # Build output directory (default: dist)
  build_output_dir: "dist"
  # Firebase token (set via FIREBASE_TOKEN env var or config)
  firebase_token: ""


setup:
  - desc: "Install Firebase CLI"
    add_dependency: ["firebase-tools"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Firebase Hosting"
      run: "firebase deploy --only hosting"

  deploy:preview:
    - desc: "Deploy preview to Firebase Hosting"
      run: "firebase hosting:channel:deploy preview"

  deploy:production:
    - desc: "Deploy to production on Firebase Hosting"
      run: "firebase deploy --only hosting --project {{project_id}}"

  preview:
    - desc: "Preview deployment locally"
      run: "firebase emulators:start --only hosting"

  firebase:init:
    - desc: "Initialize Firebase project"
      run: "firebase init hosting"

  firebase:login:
    - desc: "Login to Firebase"
      run: "firebase login"

  firebase:use:
    - desc: "Set active Firebase project"
      run: "firebase use {{project_id}}"

  firebase:list:
    - desc: "List Firebase projects"
      run: "firebase projects:list"

  firebase:open:
    - desc: "Open Firebase console in browser"
      run: "firebase open"

  firebase:functions:deploy:
    - desc: "Deploy Firebase Functions"
      run: "firebase deploy --only functions"
