version: 1

meta:
  name: "Heroku"
  description: "Deploy to Heroku"

platform:
  slug: "heroku"
  cli_tool: "heroku"
  install_hint: "npm install -g heroku"
  auth_env_var: "HEROKU_API_KEY"
  login_hint: "heroku login"
  detect_config:
    - "app.json"
    - "Procfile"
    - "heroku.yml"
  detect_state:
    - ".heroku"
  capabilities:
    env_vars: true
    custom_domains: true
    rollback: true

config:
  # Heroku app name (required)
  app_name: ""
  # Build command
  build_command: "npm run build"
  # Start command (for production)
  start_command: "npm start"
  # Heroku API key (set via HEROKU_API_KEY env var or config)
  heroku_api_key: ""


setup:
  - desc: "Install Heroku CLI"
    add_dependency: ["heroku"]
    dev: true

tasks:
  deploy:
    - desc: "Deploy to Heroku"
      run: "git push heroku main"

  deploy:production:
    - desc: "Deploy to production on Heroku"
      run: "git push heroku main"

  heroku:create:
    - desc: "Create Heroku app"
      run: "heroku create {{app_name}}"

  heroku:login:
    - desc: "Login to Heroku"
      run: "heroku login"

  heroku:env:list:
    - desc: "List environment variables"
      run: "heroku config --app {{app_name}}"

  heroku:env:set:
    - desc: "Set environment variable (set HEROKU_ENV_KEY and HEROKU_ENV_VALUE)"
      run: "heroku config:set {{HEROKU_ENV_KEY}}={{HEROKU_ENV_VALUE}} --app {{app_name}}"

  heroku:logs:
    - desc: "View deployment logs"
      run: "heroku logs --tail --app {{app_name}}"

  heroku:open:
    - desc: "Open app in browser"
      run: "heroku open --app {{app_name}}"

  heroku:ps:scale:
    - desc: "Scale dynos (set HEROKU_DYNOS)"
      run: "heroku ps:scale web={{HEROKU_DYNOS}} --app {{app_name}}"

  heroku:addons:list:
    - desc: "List addons"
      run: "heroku addons --app {{app_name}}"

  heroku:addons:create:
    - desc: "Create addon (set HEROKU_ADDON_NAME)"
      run: "heroku addons:create {{HEROKU_ADDON_NAME}} --app {{app_name}}"
